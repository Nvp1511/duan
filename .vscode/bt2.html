<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title></title>

    <style type="text/css">
      .frame {
        border: dashed medium red;
        width: 300px;
      }
    </style>
    <script language="javascript" type="text/javascript">
      function initialize() {
        var n = prompt("Enter the number n:");
        var i = 0;
        for (i = 2; i < n; i++) {
          if (n % i == 0) {
            document.getElementById("hien").innerHTML =
              n + " is not a prime number.";
            break;
          }
        }
        if (i == n)
          document.getElementById("hien").innerHTML = n + " is prime number.";
      }
    </script>
  </head>
  <body onLoad="initialize()">
    <div class="frame">
      <p><img id="mylmg" src="minechill.jpg" width="300px" /></p>
    </div>
    <input
      type="button"
      value="Hidden"
      onclick="mylmg.style.visibility = 'Hidden'"
      name=""
    />
    <input
      type="button"
      value="Show"
      onclick="mylmg.style.visibility = 'visible'"
      name=""
    />
    <div>
      <p id="hien"></p>
    </div>
  </body>
</html>
