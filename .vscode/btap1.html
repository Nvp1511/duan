<!doctype html>
<html>
  <body>
    <div class="float">
      <p>
        <img id="myImg" src="canh.jpg" />
      </p>
    </div>

    <input
      type="button"
      value="Hidden"
      onclick="document.getElementById('myImg').style.visibility = 'hidden'"
    />
    <input
      type="button"
      value="Show"
      onclick="document.getElementById('myImg').style.visibility = 'visible'"
    />
  </body>
</html>
